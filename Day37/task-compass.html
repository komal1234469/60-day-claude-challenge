<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Compass — Corporate Office</title>
<style>
  :root{
    --bg:#14171f;
    --surface:#1b2029;
    --surface2:#222836;
    --border:rgba(201,161,90,0.20);
    --border-soft:rgba(237,234,226,0.08);
    --gold:#c9a15a;
    --gold-soft:rgba(201,161,90,0.14);
    --text:#edeae2;
    --text-dim:#9098a9;
    --text-faint:#5f6779;
    --good:#7fae86;
    --bad:#c4685b;
    --c-hr:#c97b63;
    --c-it:#6c7ba6;
    --c-finance:#5b8c87;
    --c-legal:#8b6ba6;
    --c-ops:#b8944f;
    --c-exec:#c9a15a;
    --c-admin:#7a8471;
    --c-marketing:#c4685b;
    --font-display:Georgia,'Times New Roman',serif;
    --font-body:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
    --font-mono:'Courier New',monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse at 20% -10%, rgba(201,161,90,0.08), transparent 55%),
      radial-gradient(ellipse at 100% 110%, rgba(91,140,135,0.08), transparent 55%),
      var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{ background:var(--gold-soft); }
  .wrap{ max-width:920px; margin:0 auto; padding:28px 20px 70px; }

  /* ---------- Header ---------- */
  header.app-head{ text-align:center; margin-bottom:22px; }
  .mark{
    display:inline-flex; align-items:center; gap:10px; margin-bottom:6px;
    font-family:var(--font-mono); font-size:11px; letter-spacing:.18em; text-transform:uppercase;
    color:var(--gold); opacity:.85;
  }
  .mark::before,.mark::after{ content:""; width:26px; height:1px; background:var(--gold); opacity:.5; }
  h1.title{
    font-family:var(--font-display); font-weight:700; font-size:clamp(30px,5vw,44px);
    margin:0 0 6px; letter-spacing:.01em;
  }
  .subtitle{ color:var(--text-dim); font-size:15px; margin:0; }
  .workplace-chip{
    display:inline-block; margin-top:12px; padding:5px 14px; border:1px solid var(--border);
    border-radius:100px; font-size:12px; font-family:var(--font-mono); letter-spacing:.06em;
    color:var(--gold); background:var(--gold-soft);
  }

  /* ---------- Progress ---------- */
  .progress-rail{ display:flex; gap:8px; margin:26px 0 30px; }
  .progress-seg{
    flex:1; height:6px; border-radius:4px; background:var(--surface2); overflow:hidden; position:relative;
  }
  .progress-seg > i{
    display:block; height:100%; width:0%; background:linear-gradient(90deg,var(--gold),#e0bd7e);
    transition:width .5s cubic-bezier(.4,0,.2,1); border-radius:4px;
  }
  .progress-labels{ display:flex; justify-content:space-between; font-size:11px; color:var(--text-faint);
    font-family:var(--font-mono); letter-spacing:.06em; margin-top:6px; text-transform:uppercase; }
  .progress-labels span.active{ color:var(--gold); }

  /* ---------- Cards / Surfaces ---------- */
  .panel{
    background:linear-gradient(180deg, var(--surface), var(--surface2));
    border:1px solid var(--border-soft); border-radius:16px; padding:26px;
    box-shadow:0 20px 40px -20px rgba(0,0,0,0.5);
  }
  .stage-eyebrow{
    font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:.14em;
    color:var(--text-faint); margin-bottom:4px;
  }
  .stage-heading{ font-family:var(--font-display); font-size:22px; margin:0 0 4px; }
  .stage-desc{ color:var(--text-dim); font-size:14px; margin:0 0 20px; line-height:1.5; }

  /* ---------- Ticket (task) card — signature element ---------- */
  .ticket{
    position:relative; background:var(--surface2); border:1px dashed var(--border);
    border-radius:10px; padding:20px 22px 18px; margin-bottom:22px;
    animation:ticketIn .45s cubic-bezier(.2,.8,.2,1);
  }
  .ticket::before{
    content:"ROUTING SLIP"; position:absolute; top:-9px; left:18px; background:var(--bg);
    padding:0 8px; font-family:var(--font-mono); font-size:10px; letter-spacing:.14em;
    color:var(--text-faint);
  }
  .ticket-id{ font-family:var(--font-mono); font-size:11px; color:var(--gold); letter-spacing:.06em; margin-bottom:8px; }
  .ticket-text{ font-size:17px; line-height:1.5; color:var(--text); font-weight:500; }
  @keyframes ticketIn{ from{opacity:0; transform:translateY(-8px) scale(.98);} to{opacity:1; transform:none;} }

  /* ---------- Role grid ---------- */
  .role-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px; margin-bottom:18px; }
  .role-card{
    --rc: var(--role-color, var(--gold));
    background:var(--surface2); border:1px solid var(--border-soft); border-radius:12px;
    padding:14px 12px; cursor:pointer; user-select:none; text-align:center;
    transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    position:relative;
  }
  .role-card:hover{ transform:translateY(-3px); border-color:var(--rc); box-shadow:0 10px 22px -14px var(--rc); }
  .role-card:active{ transform:translateY(-1px) scale(.98); }
  .role-card .icon{ font-size:26px; display:block; margin-bottom:8px; filter:drop-shadow(0 2px 4px rgba(0,0,0,.4)); }
  .role-card .name{ font-size:13px; font-weight:600; color:var(--text); }
  .role-card .tag{ display:block; height:3px; width:26px; margin:8px auto 0; border-radius:3px; background:var(--rc); opacity:.8; }
  .role-card.selected{ border-color:var(--rc); background:linear-gradient(180deg, rgba(255,255,255,.03), transparent), var(--surface2); box-shadow:0 0 0 2px var(--rc) inset, 0 10px 24px -16px var(--rc); }
  .role-card.selected::after{ content:"✓"; position:absolute; top:8px; right:10px; color:var(--rc); font-weight:700; font-size:13px; }
  .role-card.disabled{ opacity:.35; cursor:not-allowed; pointer-events:none; }
  .role-card.primary-badge::before{
    content:"★ PRIMARY"; position:absolute; top:8px; left:10px; font-size:9px; letter-spacing:.06em;
    font-family:var(--font-mono); color:var(--rc);
  }

  [data-role="hr"]{ --role-color:var(--c-hr); }
  [data-role="it"]{ --role-color:var(--c-it); }
  [data-role="finance"]{ --role-color:var(--c-finance); }
  [data-role="legal"]{ --role-color:var(--c-legal); }
  [data-role="ops"]{ --role-color:var(--c-ops); }
  [data-role="exec"]{ --role-color:var(--c-exec); }
  [data-role="admin"]{ --role-color:var(--c-admin); }
  [data-role="marketing"]{ --role-color:var(--c-marketing); }

  /* ---------- Ownership slot (stage 1) ---------- */
  .slot-label{ font-family:var(--font-mono); font-size:11px; letter-spacing:.1em; color:var(--text-faint);
    text-transform:uppercase; margin:6px 0 8px; }
  .owner-slot{
    border:2px dashed var(--border); border-radius:12px; min-height:64px; display:flex; align-items:center;
    justify-content:center; margin-bottom:20px; transition:border-color .2s, background .2s;
    font-size:13px; color:var(--text-faint); font-family:var(--font-mono);
  }
  .owner-slot.filled{ border-style:solid; border-color:var(--role-color,var(--gold)); background:var(--gold-soft); color:var(--text); font-family:var(--font-body); font-size:14px; }
  .owner-slot.snap{ animation:snap .4s cubic-bezier(.34,1.56,.64,1); }
  @keyframes snap{ 0%{ transform:scale(.9);} 55%{ transform:scale(1.04);} 100%{ transform:scale(1);} }

  /* ---------- Sequence slots (stage 2) ---------- */
  .seq-row{ display:flex; flex-wrap:wrap; align-items:center; gap:8px; margin:16px 0 22px; }
  .seq-slot{
    min-width:120px; height:56px; border:2px dashed var(--border); border-radius:10px;
    display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:11px;
    color:var(--text-faint); position:relative; flex:1;
  }
  .seq-slot .n{ position:absolute; top:-9px; left:8px; background:var(--bg); padding:0 5px; font-size:10px; color:var(--text-faint); }
  .seq-slot.filled{ border-style:solid; border-color:var(--role-color,var(--gold)); background:var(--gold-soft); color:var(--text); font-family:var(--font-body); font-weight:600; font-size:13px; cursor:pointer; }
  .seq-arrow{ color:var(--text-faint); font-size:18px; flex:0 0 auto; }
  .seq-slot.correct{ border-color:var(--good); background:rgba(127,174,134,0.14); }
  .seq-slot.wrong{ border-color:var(--bad); background:rgba(196,104,91,0.14); }

  /* ---------- Reveal panel ---------- */
  .reveal{ margin-top:18px; padding-top:18px; border-top:1px solid var(--border-soft); animation:fadeUp .4s ease; }
  @keyframes fadeUp{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }
  .reveal-row{ display:flex; gap:10px; margin-bottom:10px; align-items:flex-start; }
  .reveal-row .k{ font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:.08em;
    color:var(--gold); min-width:130px; padding-top:2px; flex:0 0 auto; }
  .reveal-row .v{ font-size:14px; line-height:1.55; color:var(--text); }
  .assist-chip{ display:inline-block; padding:3px 10px; margin:2px 4px 2px 0; border-radius:100px;
    background:var(--surface2); border:1px solid var(--border-soft); font-size:12px; }

  /* ---------- Buttons ---------- */
  .btn-row{ display:flex; justify-content:flex-end; gap:10px; margin-top:20px; }
  button.btn{
    font-family:var(--font-body); font-size:14px; font-weight:600; padding:11px 22px; border-radius:100px;
    border:1px solid var(--gold); background:var(--gold); color:#1b1608; cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease; letter-spacing:.01em;
  }
  button.btn:hover{ transform:translateY(-1px); box-shadow:0 10px 22px -12px var(--gold); }
  button.btn:disabled{ opacity:.35; cursor:not-allowed; transform:none; box-shadow:none; }
  button.btn.ghost{ background:transparent; color:var(--gold); }

  /* ---------- Stamp ---------- */
  .stamp{
    position:absolute; top:14px; right:18px; font-family:var(--font-mono); font-weight:700; font-size:12px;
    letter-spacing:.1em; color:var(--good); border:2px solid var(--good); border-radius:6px; padding:4px 9px;
    transform:rotate(-8deg) scale(0); opacity:0;
    animation:stampIn .5s cubic-bezier(.2,1.4,.4,1) .1s forwards;
  }
  @keyframes stampIn{ to{ transform:rotate(-8deg) scale(1); opacity:.9; } }

  /* ---------- Intro ---------- */
  .intro-role-preview{ display:flex; flex-wrap:wrap; gap:8px; margin:18px 0 6px; }
  .mini-chip{ font-size:12px; padding:5px 11px; border-radius:100px; border:1px solid var(--border-soft); background:var(--surface2); }

  /* ---------- Results ---------- */
  .bars{ display:flex; flex-direction:column; gap:16px; margin:18px 0 26px; }
  .bar-row .label{ display:flex; justify-content:space-between; font-size:13px; margin-bottom:6px; }
  .bar-row .label b{ font-family:var(--font-mono); color:var(--gold); }
  .bar-track{ height:12px; border-radius:8px; background:var(--surface2); overflow:hidden; }
  .bar-fill{ height:100%; border-radius:8px; background:linear-gradient(90deg,var(--gold),#7fae86); width:0%;
    transition:width 1s cubic-bezier(.2,.8,.2,1); }
  .reflect-block{ background:var(--surface2); border-left:3px solid var(--gold); border-radius:0 10px 10px 0;
    padding:14px 16px; margin-bottom:12px; font-size:14px; line-height:1.6; }
  .reflect-block b{ color:var(--gold); }
  .insight{ font-family:var(--font-display); font-style:italic; font-size:16px; text-align:center; margin:24px 0 6px;
    color:var(--text); }

  /* ---------- Confetti ---------- */
  .confetti-layer{ position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:50; }
  .confetti-piece{ position:absolute; top:-20px; width:8px; height:14px; opacity:.9; border-radius:2px;
    animation:fall linear forwards; }
  @keyframes fall{ to{ transform:translateY(110vh) rotate(540deg); opacity:0; } }

  footer.foot{ text-align:center; margin-top:34px; font-size:11px; color:var(--text-faint); font-family:var(--font-mono); }

  @media (max-width:560px){
    .reveal-row{ flex-direction:column; gap:2px; }
    .reveal-row .k{ min-width:0; }
    .seq-slot{ min-width:100px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="app-head">
    <div class="mark">Task Compass</div>
    <h1 class="title">Task Compass</h1>
    <p class="subtitle">Learn how work flows through real organizations.</p>
    <div class="workplace-chip" id="workplaceChip">Corporate Office</div>
  </header>

  <div id="progressWrap"></div>
  <main id="app"></main>
  <footer class="foot">TASK COMPASS · ORG DESIGN SIMULATOR · OFFLINE EDITION</footer>
</div>

<script>
(function(){
"use strict";

/* ============ DATA ============ */
var ROLES = [
  {id:"hr", name:"HR Manager", icon:"🧑\u200d💼"},
  {id:"it", name:"IT Support", icon:"💻"},
  {id:"finance", name:"Finance & Accounting", icon:"💰"},
  {id:"legal", name:"Legal & Compliance", icon:"⚖️"},
  {id:"ops", name:"Operations Manager", icon:"📋"},
  {id:"exec", name:"Executive Leadership", icon:"🏛️"},
  {id:"admin", name:"Office Administrator", icon:"🗂️"},
  {id:"marketing", name:"Marketing & Comms", icon:"📣"}
];
function roleById(id){ for(var i=0;i<ROLES.length;i++){ if(ROLES[i].id===id) return ROLES[i]; } return null; }

var STAGE1_POOL = [
  {id:"T1", text:"An employee reports their laptop won't connect to the company VPN.", owner:"it",
    why:"IT Support owns the systems and connectivity that keep everyone's tools working — this is a technical access issue at its core.", assist:["admin"]},
  {id:"T2", text:"A new hire's paperwork and background check haven't been processed before their start date.", owner:"hr",
    why:"HR Manager owns onboarding — contracts, verification, and making sure a new employee is legally cleared to start.", assist:["legal","admin"]},
  {id:"T3", text:"This quarter's expense reports don't reconcile with the budget.", owner:"finance",
    why:"Finance & Accounting owns budget tracking and reconciliation — they're the source of truth for where money actually went.", assist:["ops"]},
  {id:"T4", text:"A vendor contract renewal includes a clause that could expose the company to liability.", owner:"legal",
    why:"Legal & Compliance owns risk review on contract language — no one else is positioned to judge liability exposure.", assist:["finance","exec"]},
  {id:"T5", text:"The office lease is expiring in two months and no one has confirmed renewal terms.", owner:"admin",
    why:"Office Administrator owns facilities logistics — leases, space planning, and physical operations fall to them.", assist:["finance","legal"]},
  {id:"T6", text:"A recent press mention misquoted the company's stance on a public issue.", owner:"marketing",
    why:"Marketing & Comms owns external messaging — correcting public narrative is squarely their function.", assist:["exec","legal"]},
  {id:"T7", text:"Two departments are duplicating the same client outreach, confusing the client.", owner:"ops",
    why:"Operations Manager owns cross-team workflow — this is a coordination breakdown between departments, not a single team's fault.", assist:["exec"]},
  {id:"T8", text:"The board wants a summary of quarterly performance before next week's meeting.", owner:"exec",
    why:"Executive Leadership owns strategic reporting upward to the board — they synthesize and present, even if others supply data.", assist:["finance","ops"]},
  {id:"T9", text:"An employee has filed a harassment complaint against a manager.", owner:"hr",
    why:"HR Manager owns handling personnel complaints — confidentiality, process, and fairness all sit within their remit.", assist:["legal","exec"]},
  {id:"T10", text:"The shared printer and office network keeps failing during peak hours.", owner:"it",
    why:"IT Support owns network hardware reliability — this is infrastructure, not a facilities issue.", assist:["admin"]}
];

var STAGE2_POOL = [
  {id:"R1", text:"A client submits a formal complaint about a billing error.",
    steps:["admin","finance","ops","exec"],
    explain:"Complaints typically enter through the front office, get verified against the underlying data by Finance, get assessed for process gaps by Operations, and finally receive Executive sign-off before a resolution goes back to the client."},
  {id:"R2", text:"A new employee needs to be fully set up before their first day.",
    steps:["hr","it","admin"],
    explain:"Onboarding starts with HR finalizing employment terms, IT provisions system and account access, and the Office Administrator prepares the physical workspace — in that order, since each step depends on the last being confirmed."},
  {id:"R3", text:"Legal risk is discovered mid-negotiation in a vendor contract.",
    steps:["legal","finance","exec"],
    explain:"Legal flags the risky clause first, Finance quantifies what it would cost the company, and Executive Leadership signs off on final terms — risk is identified before it's priced, and priced before it's approved."},
  {id:"R4", text:"A major PR issue breaks out on social media overnight.",
    steps:["marketing","legal","exec","hr"],
    explain:"Marketing drafts the response fast, Legal reviews it for liability, Executive Leadership approves the public statement, and HR follows with an internal message so staff aren't blindsided by the news."},
  {id:"R5", text:"An employee raises a formal workplace complaint about their manager.",
    steps:["hr","legal","exec"],
    explain:"HR receives and investigates first, Legal reviews the compliance and liability angle, and Executive Leadership is briefed on the outcome — investigation always precedes escalation."}
];

var STAGE3_POOL = [
  {id:"C1", text:"Employee satisfaction scores drop sharply company-wide.",
    primary:"hr", support:["exec","ops","admin"],
    reasoning:"HR owns the root investigation into culture and morale, but Executive Leadership needs to weigh in on direction, Operations may need to rebalance workloads, and Office Administrator may need to address the physical environment.",
    flow:"HR surveys teams → shares findings with Executive Leadership → Operations adjusts workflows → Admin addresses environment factors."},
  {id:"C2", text:"A competitor announces a major price cut and clients start asking questions.",
    primary:"exec", support:["finance","marketing","ops"],
    reasoning:"Executive Leadership sets the strategic response, Finance models the pricing impact, Marketing crafts client-facing messaging, and Operations confirms what's actually deliverable at any new terms.",
    flow:"Exec convenes a response → Finance runs the numbers → Marketing prepares messaging → Operations confirms feasibility."},
  {id:"C3", text:"A data breach exposes employee records.",
    primary:"it", support:["legal","hr","exec"],
    reasoning:"IT contains and investigates the breach technically, Legal manages compliance and reporting obligations, HR handles communication with affected employees, and Executive Leadership oversees the company's overall response.",
    flow:"IT contains the breach → Legal assesses reporting obligations → HR notifies affected staff → Exec communicates externally."},
  {id:"C4", text:"Quarterly costs are running well over budget with no clear single cause.",
    primary:"finance", support:["ops","exec","admin"],
    reasoning:"Finance owns the budget analysis itself, Operations helps identify where costs are actually being incurred day-to-day, Executive Leadership approves corrective action, and Admin may need to trim facility overhead.",
    flow:"Finance audits spend → Operations identifies cost drivers → Exec approves cuts → Admin implements facility changes."},
  {id:"C5", text:"A major client threatens to leave due to inconsistent communication.",
    primary:"ops", support:["marketing","exec","hr"],
    reasoning:"Operations owns fixing the coordination breakdown itself, Marketing repairs the relationship narrative, Executive Leadership may step in personally for a high-value account, and HR addresses any team training gaps.",
    flow:"Ops audits the breakdown → Marketing crafts client messaging → Exec engages personally → HR addresses training needs."}
];

/* ============ STATE ============ */
var state = {
  screen:"intro",
  s1:{ tasks:pick(STAGE1_POOL,3), idx:0, answered:false, chosen:null, correctCount:0 },
  s2:{ tasks:pick(STAGE2_POOL,3), idx:0, slots:[], submitted:false, results:[] },
  s3:{ tasks:pick(STAGE3_POOL,3), idx:0, primary:null, support:[], submitted:false, results:[] },
  scores:{ ownership:[], delegation:[], collaboration:[], workflow:[] }
};

function pick(pool, n){
  var arr = pool.slice();
  for(var i=arr.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=arr[i]; arr[i]=arr[j]; arr[j]=t; }
  return arr.slice(0,n);
}
function shuffled(arr){ return pick(arr, arr.length); }

/* ============ RENDER SHELL ============ */
var app = document.getElementById("app");
var progressWrap = document.getElementById("progressWrap");

function renderProgress(){
  var stageIdx = {intro:0, stage1:1,"stage1-reveal":1, stage2:2,"stage2-reveal":2, stage3:3,"stage3-reveal":3, results:4}[state.screen];
  var labels = ["Who Owns This?","Task Routing","Collaboration","Compass"];
  var html = '<div class="progress-rail">';
  for(var i=1;i<=4;i++){
    var pct = 0;
    if(i < stageIdx) pct = 100;
    else if(i === stageIdx){
      if(i===1) pct = state.screen==="intro" ? 0 : (state.s1.idx/3)*100 + (state.screen==="stage1-reveal"?16:0);
      else if(i===2) pct = (state.s2.idx/3)*100 + (state.screen==="stage2-reveal"?16:0);
      else if(i===3) pct = (state.s3.idx/3)*100 + (state.screen==="stage3-reveal"?16:0);
      else pct = 100;
    }
    pct = Math.min(100, Math.max(0,pct));
    html += '<div class="progress-seg"><i style="width:'+pct+'%"></i></div>';
  }
  html += '</div><div class="progress-labels">';
  for(var k=0;k<4;k++){
    html += '<span class="'+(k+1===stageIdx?"active":"")+'">'+labels[k]+'</span>';
  }
  html += '</div>';
  progressWrap.innerHTML = html;
}

function roleGridHTML(selectableIds, opts){
  opts = opts||{};
  var html = '<div class="role-grid">';
  ROLES.forEach(function(r){
    var extra = "";
    if(opts.selectedId===r.id) extra += " selected";
    if(opts.primaryId===r.id) extra += " primary-badge selected";
    if(opts.disabledIds && opts.disabledIds.indexOf(r.id)>-1) extra += " disabled";
    html += '<div class="role-card'+extra+'" data-role="'+r.id+'" data-action="'+(opts.action||"pick")+'" data-rid="'+r.id+'">'+
      '<span class="icon">'+r.icon+'</span><span class="name">'+r.name+'</span><span class="tag"></span></div>';
  });
  html += '</div>';
  return html;
}

/* ============ INTRO ============ */
function renderIntro(){
  app.innerHTML =
    '<div class="panel">'+
      '<div class="stage-eyebrow">Briefing</div>'+
      '<h2 class="stage-heading">Welcome to the Corporate Office</h2>'+
      '<p class="stage-desc">You are stepping into a mid-size corporate office. Work doesn\'t move because of job titles — it moves because someone owns it, someone delegates it, and someone collaborates on it. Over three stages you\'ll practice all three.</p>'+
      '<div class="slot-label">Departments in play</div>'+
      '<div class="intro-role-preview">'+ROLES.map(function(r){return '<span class="mini-chip">'+r.icon+' '+r.name+'</span>';}).join("")+'</div>'+
      '<div class="btn-row"><button class="btn" id="startBtn">Begin Stage 1 →</button></div>'+
    '</div>';
  document.getElementById("startBtn").onclick = function(){ state.screen="stage1"; render(); };
}

/* ============ STAGE 1 ============ */
function renderStage1(){
  var task = state.s1.tasks[state.s1.idx];
  var html = '<div class="panel">'+
    '<div class="stage-eyebrow">Stage 1 · Question '+(state.s1.idx+1)+' of 3</div>'+
    '<h2 class="stage-heading">Who Owns This?</h2>'+
    '<p class="stage-desc">Drag — or tap — the role that should <b>primarily own</b> this task into the slot below.</p>'+
    '<div class="ticket"><div class="ticket-id">TICKET #'+task.id+'</div><div class="ticket-text">'+task.text+'</div></div>'+
    '<div class="slot-label">Ownership Slot</div>'+
    '<div class="owner-slot" id="ownerSlot" data-role="">Drop the owning role here</div>'+
    roleGridHTML(null, {action:"assign"})+
    '</div>';
  app.innerHTML = html;
  var slot = document.getElementById("ownerSlot");
  document.querySelectorAll('.role-card[data-action="assign"]').forEach(function(card){
    card.setAttribute("draggable","true");
    card.addEventListener("click", function(){ assignOwner(card.getAttribute("data-rid")); });
    card.addEventListener("dragstart", function(e){ e.dataTransfer.setData("text/plain", card.getAttribute("data-rid")); });
  });
  slot.addEventListener("dragover", function(e){ e.preventDefault(); });
  slot.addEventListener("drop", function(e){ e.preventDefault(); var rid = e.dataTransfer.getData("text/plain"); if(rid) assignOwner(rid); });
}

function assignOwner(rid){
  if(state.s1.answered) return;
  var task = state.s1.tasks[state.s1.idx];
  state.s1.answered = true;
  state.s1.chosen = rid;
  var correct = rid === task.owner;
  if(correct) state.s1.correctCount++;
  state.scores.ownership.push(correct ? 1 : 0);
  state.screen = "stage1-reveal";
  render();
}

function renderStage1Reveal(){
  var task = state.s1.tasks[state.s1.idx];
  var chosenRole = roleById(state.s1.chosen);
  var ownerRole = roleById(task.owner);
  var correct = state.s1.chosen === task.owner;
  var html = '<div class="panel" style="position:relative;">'+
    '<div class="stamp" style="'+(correct?"":"color:var(--bad);border-color:var(--bad);")+'">'+(correct?"WELL ROUTED":"MISROUTED")+'</div>'+
    '<div class="stage-eyebrow">Stage 1 · Question '+(state.s1.idx+1)+' of 3</div>'+
    '<h2 class="stage-heading">'+(correct?"That tracks.":"Worth a second look.")+'</h2>'+
    '<div class="ticket"><div class="ticket-id">TICKET #'+task.id+'</div><div class="ticket-text">'+task.text+'</div></div>'+
    '<div class="reveal">'+
      '<div class="reveal-row"><div class="k">You assigned</div><div class="v">'+chosenRole.icon+' '+chosenRole.name+'</div></div>'+
      '<div class="reveal-row"><div class="k">✓ Primary Owner</div><div class="v">'+ownerRole.icon+' '+ownerRole.name+'</div></div>'+
      '<div class="reveal-row"><div class="k">Why they own it</div><div class="v">'+task.why+'</div></div>'+
      '<div class="reveal-row"><div class="k">May assist</div><div class="v">'+task.assist.map(function(a){var r=roleById(a); return '<span class="assist-chip">'+r.icon+' '+r.name+'</span>';}).join("")+'</div></div>'+
    '</div>'+
    '<div class="btn-row"><button class="btn" id="nextBtn">'+(state.s1.idx<2?"Next Ticket →":"Continue to Stage 2 →")+'</button></div>'+
    '</div>';
  app.innerHTML = html;
  document.getElementById("nextBtn").onclick = function(){
    if(state.s1.idx < 2){
      state.s1.idx++; state.s1.answered=false; state.s1.chosen=null; state.screen="stage1";
    } else {
      state.screen = "stage2";
    }
    render();
  };
}

/* ============ STAGE 2 ============ */
function renderStage2(){
  var task = state.s2.tasks[state.s2.idx];
  if(!state.s2.slots || state.s2.slots.length !== task.steps.length || state.s2._forId !== task.id){
    state.s2.slots = new Array(task.steps.length).fill(null);
    state.s2._forId = task.id;
    state.s2.submitted = false;
  }
  var slotsHtml = '<div class="seq-row">';
  task.steps.forEach(function(_, i){
    var filled = state.s2.slots[i];
    var role = filled ? roleById(filled) : null;
    slotsHtml += '<div class="seq-slot'+(filled?" filled":"")+'" data-role="'+(filled||"")+'" data-idx="'+i+'">'+
      '<span class="n">STEP '+(i+1)+'</span>'+(role? role.icon+' '+role.name : "—")+'</div>';
    if(i < task.steps.length-1) slotsHtml += '<div class="seq-arrow">→</div>';
  });
  slotsHtml += '</div>';

  var filledIds = state.s2.slots.filter(Boolean);
  var html = '<div class="panel">'+
    '<div class="stage-eyebrow">Stage 2 · Question '+(state.s2.idx+1)+' of 3</div>'+
    '<h2 class="stage-heading">Task Routing</h2>'+
    '<p class="stage-desc">Build the workflow. Tap roles in the order the task should move through the organization. Tap a filled step to clear it.</p>'+
    '<div class="ticket"><div class="ticket-id">TICKET #'+task.id+'</div><div class="ticket-text">'+task.text+'</div></div>'+
    '<div class="slot-label">Workflow ('+task.steps.length+' steps)</div>'+
    slotsHtml+
    '<div class="slot-label">Available Roles</div>'+
    roleGridHTML(null, {action:"route", disabledIds: filledIds})+
    '<div class="btn-row"><button class="btn" id="submitRouteBtn" '+(state.s2.slots.every(Boolean)?"":"disabled")+'>Submit Route</button></div>'+
    '</div>';
  app.innerHTML = html;

  document.querySelectorAll('.seq-slot.filled').forEach(function(el){
    el.addEventListener("click", function(){
      if(state.s2.submitted) return;
      var idx = parseInt(el.getAttribute("data-idx"),10);
      state.s2.slots[idx] = null;
      render();
    });
  });
  document.querySelectorAll('.role-card[data-action="route"]').forEach(function(card){
    card.addEventListener("click", function(){
      if(card.classList.contains("disabled")) return;
      var next = state.s2.slots.indexOf(null);
      if(next === -1) return;
      state.s2.slots[next] = card.getAttribute("data-rid");
      render();
    });
  });
  var submitBtn = document.getElementById("submitRouteBtn");
  if(submitBtn) submitBtn.onclick = function(){
    var task2 = state.s2.tasks[state.s2.idx];
    var correctPositions = 0;
    task2.steps.forEach(function(s,i){ if(state.s2.slots[i]===s) correctPositions++; });
    var pct = correctPositions / task2.steps.length;
    state.scores.workflow.push(pct);
    state.s2.results.push({correctPositions:correctPositions, total:task2.steps.length});
    state.s2.submitted = true;
    state.screen = "stage2-reveal";
    render();
  };
}

function renderStage2Reveal(){
  var task = state.s2.tasks[state.s2.idx];
  var result = state.s2.results[state.s2.results.length-1];
  var slotsHtml = '<div class="seq-row">';
  task.steps.forEach(function(correctRole, i){
    var chosen = state.s2.slots[i];
    var ok = chosen === correctRole;
    var role = roleById(chosen);
    slotsHtml += '<div class="seq-slot filled '+(ok?"correct":"wrong")+'"><span class="n">STEP '+(i+1)+'</span>'+role.icon+' '+role.name+'</div>';
    if(i < task.steps.length-1) slotsHtml += '<div class="seq-arrow">→</div>';
  });
  slotsHtml += '</div>';
  var idealHtml = task.steps.map(function(s){ var r=roleById(s); return '<span class="assist-chip">'+r.icon+' '+r.name+'</span>'; }).join(' <span style="color:var(--text-faint)">→</span> ');

  var html = '<div class="panel" style="position:relative;">'+
    '<div class="stamp">'+result.correctPositions+'/'+result.total+' STEPS</div>'+
    '<div class="stage-eyebrow">Stage 2 · Question '+(state.s2.idx+1)+' of 3</div>'+
    '<h2 class="stage-heading">Here\'s how it actually flows.</h2>'+
    '<div class="ticket"><div class="ticket-id">TICKET #'+task.id+'</div><div class="ticket-text">'+task.text+'</div></div>'+
    '<div class="slot-label">Your Route</div>'+slotsHtml+
    '<div class="reveal">'+
      '<div class="reveal-row"><div class="k">Typical Route</div><div class="v">'+idealHtml+'</div></div>'+
      '<div class="reveal-row"><div class="k">Why this order</div><div class="v">'+task.explain+'</div></div>'+
    '</div>'+
    '<div class="btn-row"><button class="btn" id="nextBtn2">'+(state.s2.idx<2?"Next Ticket →":"Continue to Stage 3 →")+'</button></div>'+
    '</div>';
  app.innerHTML = html;
  document.getElementById("nextBtn2").onclick = function(){
    if(state.s2.idx < 2){
      state.s2.idx++; state.screen="stage2";
    } else {
      state.screen = "stage3";
    }
    render();
  };
}

/* ============ STAGE 3 ============ */
function renderStage3(){
  var task = state.s3.tasks[state.s3.idx];
  var canSubmit = state.s3.primary && state.s3.support.length >= 1;
  var html = '<div class="panel">'+
    '<div class="stage-eyebrow">Stage 3 · Situation '+(state.s3.idx+1)+' of 3</div>'+
    '<h2 class="stage-heading">Collaboration Challenge</h2>'+
    '<p class="stage-desc">Bigger problems rarely have one owner. First tap a role to set it as <b>Primary Owner</b>, then tap up to <b>3 more</b> roles to bring in as support.</p>'+
    '<div class="ticket"><div class="ticket-id">SITUATION #'+task.id+'</div><div class="ticket-text">'+task.text+'</div></div>'+
    '<div class="slot-label">Primary Owner: '+(state.s3.primary? roleById(state.s3.primary).name : "not set")+' · Support ('+state.s3.support.length+'/3)</div>'+
    '<div class="role-grid" id="s3grid">'+ROLES.map(function(r){
      var isPrimary = state.s3.primary===r.id;
      var isSupport = state.s3.support.indexOf(r.id)>-1;
      var cls = "role-card" + (isPrimary?" primary-badge selected":"") + (isSupport?" selected":"");
      return '<div class="'+cls+'" data-role="'+r.id+'" data-rid="'+r.id+'">'+
        '<span class="icon">'+r.icon+'</span><span class="name">'+r.name+'</span>'+
        '<div style="display:flex;gap:6px;justify-content:center;margin-top:8px;">'+
        '<button type="button" class="mini-chip" data-act="primary" data-rid="'+r.id+'" style="cursor:pointer;'+(isPrimary?"border-color:var(--role-color);color:var(--role-color);":"")+'">★ Primary</button>'+
        '<button type="button" class="mini-chip" data-act="support" data-rid="'+r.id+'" style="cursor:pointer;'+(isSupport?"border-color:var(--role-color);color:var(--role-color);":"")+'">+ Support</button>'+
        '</div></div>';
    }).join("")+'</div>'+
    '<div class="btn-row"><button class="btn" id="submitCollabBtn" '+(canSubmit?"":"disabled")+'>Submit Assignment</button></div>'+
    '</div>';
  app.innerHTML = html;

  document.querySelectorAll('#s3grid [data-act="primary"]').forEach(function(btn){
    btn.addEventListener("click", function(e){
      e.stopPropagation();
      var rid = btn.getAttribute("data-rid");
      state.s3.primary = (state.s3.primary===rid) ? null : rid;
      state.s3.support = state.s3.support.filter(function(x){return x!==state.s3.primary;});
      render();
    });
  });
  document.querySelectorAll('#s3grid [data-act="support"]').forEach(function(btn){
    btn.addEventListener("click", function(e){
      e.stopPropagation();
      var rid = btn.getAttribute("data-rid");
      if(rid === state.s3.primary) return;
      var idx = state.s3.support.indexOf(rid);
      if(idx>-1){ state.s3.support.splice(idx,1); }
      else if(state.s3.support.length < 3){ state.s3.support.push(rid); }
      render();
    });
  });
  var submitBtn = document.getElementById("submitCollabBtn");
  if(submitBtn) submitBtn.onclick = function(){
    var t = state.s3.tasks[state.s3.idx];
    var primaryCorrect = state.s3.primary === t.primary;
    var matches = state.s3.support.filter(function(s){ return t.support.indexOf(s)>-1; }).length;
    var collabScore = matches / t.support.length;
    var idealCount = t.support.length;
    var chosenCount = state.s3.support.length;
    var delegationScore = Math.max(0, 1 - Math.abs(chosenCount-idealCount)*0.25);
    state.scores.ownership.push(primaryCorrect?1:0);
    state.scores.collaboration.push(collabScore);
    state.scores.delegation.push(delegationScore);
    state.s3.results.push({
      primaryCorrect:primaryCorrect, matches:matches, idealCount:idealCount, chosenCount:chosenCount,
      overAssigned: chosenCount > idealCount, underAssigned: chosenCount < idealCount
    });
    state.s3.submitted = true;
    state.screen = "stage3-reveal";
    render();
  };
}

function renderStage3Reveal(){
  var task = state.s3.tasks[state.s3.idx];
  var result = state.s3.results[state.s3.results.length-1];
  var yourPrimary = roleById(state.s3.primary);
  var idealPrimary = roleById(task.primary);
  var yourSupportHtml = state.s3.support.map(function(s){
    var r = roleById(s); var ok = task.support.indexOf(s)>-1;
    return '<span class="assist-chip" style="'+(ok?"border-color:var(--good);":"border-color:var(--bad);")+'">'+r.icon+' '+r.name+(ok?" ✓":" —")+'</span>';
  }).join("");
  var idealSupportHtml = task.support.map(function(s){ var r=roleById(s); return '<span class="assist-chip">'+r.icon+' '+r.name+'</span>'; }).join("");

  var html = '<div class="panel" style="position:relative;">'+
    '<div class="stamp" style="'+(result.primaryCorrect?"":"color:var(--bad);border-color:var(--bad);")+'">'+(result.primaryCorrect?"OWNER MATCHED":"OWNER DIFFERS")+'</div>'+
    '<div class="stage-eyebrow">Stage 3 · Situation '+(state.s3.idx+1)+' of 3</div>'+
    '<h2 class="stage-heading">Here\'s how this usually gets handled.</h2>'+
    '<div class="ticket"><div class="ticket-id">SITUATION #'+task.id+'</div><div class="ticket-text">'+task.text+'</div></div>'+
    '<div class="reveal">'+
      '<div class="reveal-row"><div class="k">You chose</div><div class="v">Primary: '+yourPrimary.icon+' '+yourPrimary.name+'<br>Support: '+(yourSupportHtml||"<i>none</i>")+'</div></div>'+
      '<div class="reveal-row"><div class="k">Primary Owner</div><div class="v">'+idealPrimary.icon+' '+idealPrimary.name+'</div></div>'+
      '<div class="reveal-row"><div class="k">Supporting Teams</div><div class="v">'+idealSupportHtml+'</div></div>'+
      '<div class="reveal-row"><div class="k">Reasoning</div><div class="v">'+task.reasoning+'</div></div>'+
      '<div class="reveal-row"><div class="k">Communication Flow</div><div class="v">'+task.flow+'</div></div>'+
    '</div>'+
    '<div class="btn-row"><button class="btn" id="nextBtn3">'+(state.s3.idx<2?"Next Situation →":"See My Compass →")+'</button></div>'+
    '</div>';
  app.innerHTML = html;
  document.getElementById("nextBtn3").onclick = function(){
    if(state.s3.idx < 2){
      state.s3.idx++; state.s3.primary=null; state.s3.support=[]; state.screen="stage3";
    } else {
      state.screen = "results";
    }
    render();
  };
}

/* ============ RESULTS ============ */
function avg(arr){ if(!arr.length) return 0; return arr.reduce(function(a,b){return a+b;},0)/arr.length; }

function renderResults(){
  var ownership = Math.round(avg(state.scores.ownership)*100);
  var delegation = Math.round(avg(state.scores.delegation)*100);
  var collaboration = Math.round(avg(state.scores.collaboration)*100);
  var workflow = Math.round(avg(state.scores.workflow)*100);

  var overCount = state.s3.results.filter(function(r){return r.overAssigned;}).length;
  var underCount = state.s3.results.filter(function(r){return r.underAssigned;}).length;
  var strongest = ["Ownership","Delegation","Collaboration","Workflow Thinking"][
    [ownership,delegation,collaboration,workflow].indexOf(Math.max(ownership,delegation,collaboration,workflow))
  ];

  var understoodWell = "You most reliably identified <b>"+strongest.toLowerCase()+"</b> — recognizing "+
    (strongest==="Ownership" ? "who a task genuinely belongs to, even across unfamiliar departments." :
     strongest==="Delegation" ? "roughly how many hands a situation actually needs, without over- or under-committing people." :
     strongest==="Collaboration" ? "which departments needed to be in the room together for a complex situation." :
     "the natural order work moves through an organization.");

  var overAssignText = overCount >= underCount && overCount > 0
    ? "In "+overCount+" of 3 collaboration situations, you pulled in more departments than the situation typically needs. Wide nets feel safe, but every extra name in the loop adds a coordination cost."
    : "You didn't consistently over-assign — when you brought in support, it tended to be close to what the situation called for.";

  var underCollabText = underCount > 0
    ? "In "+underCount+" of 3 situations, you assigned fewer supporting roles than the situation typically needs — a sign of leaning toward single ownership even when a problem is genuinely cross-functional."
    : "You generally recognized when a problem needed more than one department at the table.";

  var insights = [
    "Many real workplace problems are solved by teams rather than individuals.",
    "Ownership tells you who is accountable — it rarely tells you who does all the work.",
    "The order work moves through an organization is rarely arbitrary; it usually follows who needs to sign off before whom.",
    "Escalating too early can be as costly as escalating too late."
  ];
  var insight = insights[Math.floor(Math.random()*insights.length)];

  var html = '<div class="panel">'+
    '<div class="stage-eyebrow">Final Report</div>'+
    '<h2 class="stage-heading">Your Organizational Thinking Compass</h2>'+
    '<p class="stage-desc">Not a score — a shape. Here\'s how your instincts distributed across four skills.</p>'+
    '<div class="bars">'+
      barRow("Ownership", ownership)+
      barRow("Delegation", delegation)+
      barRow("Collaboration", collaboration)+
      barRow("Workflow Thinking", workflow)+
    '</div>'+
    '<div class="reflect-block"><b>What you understood well.</b><br>'+understoodWell+'</div>'+
    '<div class="reflect-block"><b>Where you tended to over-assign responsibility.</b><br>'+overAssignText+'</div>'+
    '<div class="reflect-block"><b>Where you underestimated collaboration.</b><br>'+underCollabText+'</div>'+
    '<div class="insight">"'+insight+'"</div>'+
    '<div class="btn-row"><button class="btn ghost" id="replayBtn">↺ Replay</button></div>'+
    '</div>';
  app.innerHTML = html;
  setTimeout(function(){
    document.querySelectorAll(".bar-fill").forEach(function(el){ el.style.width = el.getAttribute("data-pct")+"%"; });
    fireConfetti();
  }, 80);
  document.getElementById("replayBtn").onclick = function(){
    state = {
      screen:"intro",
      s1:{ tasks:pick(STAGE1_POOL,3), idx:0, answered:false, chosen:null, correctCount:0 },
      s2:{ tasks:pick(STAGE2_POOL,3), idx:0, slots:[], submitted:false, results:[] },
      s3:{ tasks:pick(STAGE3_POOL,3), idx:0, primary:null, support:[], submitted:false, results:[] },
      scores:{ ownership:[], delegation:[], collaboration:[], workflow:[] }
    };
    render();
  };
}

function barRow(label, pct){
  return '<div class="bar-row">'+
    '<div class="label"><span>'+label+'</span><b>'+pct+'%</b></div>'+
    '<div class="bar-track"><div class="bar-fill" data-pct="'+pct+'"></div></div>'+
    '</div>';
}

function fireConfetti(){
  var layer = document.createElement("div");
  layer.className = "confetti-layer";
  document.body.appendChild(layer);
  var colors = ["#c9a15a","#5b8c87","#c97b63","#8b6ba6","#7fae86"];
  for(var i=0;i<40;i++){
    var p = document.createElement("div");
    p.className = "confetti-piece";
    p.style.left = (Math.random()*100)+"vw";
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDuration = (2.4+Math.random()*1.6)+"s";
    p.style.animationDelay = (Math.random()*0.6)+"s";
    layer.appendChild(p);
  }
  setTimeout(function(){ layer.remove(); }, 4500);
}

/* ============ MAIN RENDER SWITCH ============ */
function render(){
  renderProgress();
  switch(state.screen){
    case "intro": renderIntro(); break;
    case "stage1": renderStage1(); break;
    case "stage1-reveal": renderStage1Reveal(); break;
    case "stage2": renderStage2(); break;
    case "stage2-reveal": renderStage2Reveal(); break;
    case "stage3": renderStage3(); break;
    case "stage3-reveal": renderStage3Reveal(); break;
    case "results": renderResults(); break;
  }
  window.scrollTo({top:0, behavior:"smooth"});
}

render();
})();
</script>
</body>
</html>
